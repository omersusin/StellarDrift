name: Build & Release Stellar Drift

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > stellar-drift.jks

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Signed Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/debug/*.apk app/build/outputs/apk/debug/StellarDrift-v2.0-debug.apk || true
          mv app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/StellarDrift-v2.0-release.apk || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: StellarDrift-debug
          path: app/build/outputs/apk/debug/StellarDrift-v2.0-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: StellarDrift-release
          path: app/build/outputs/apk/release/StellarDrift-v2.0-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Stellar Drift ${{ github.ref_name }}"
          body: |
            ## 🚀 Stellar Drift ${{ github.ref_name }}

            **An endless space survival game — made entirely by AI.**

            ### ✨ Features
            - 🕹️ Virtual joystick control — full freedom of movement
            - 🌊 Tempo system — Calm, Pressure, Reward phases
            - 💥 Freeze frame + shockwave death effects
            - 🔥 Overdrive mode at combo x8
            - ⚡ 4 power-ups: Magnet, Slow-Mo, Double, Shield
            - 📊 Score milestones with celebrations
            - ⚙️ Difficulty + Game Speed settings
            - 🔊 Programmatic audio — zero sound files
            - 🎨 100% Canvas API graphics — zero image files

            ### 📱 Requirements
            - Android 5.0+ (API 21)

            ### 📦 Install
            Download **StellarDrift-v2.0-release.apk** and install.
          files: |
            app/build/outputs/apk/release/StellarDrift-v2.0-release.apk
            app/build/outputs/apk/debug/StellarDrift-v2.0-debug.apk
          draft: false
          prerelease: false
