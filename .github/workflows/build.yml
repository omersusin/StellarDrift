name: Build & Release Stellar Drift

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > stellar-drift.jks

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Signed Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/debug/*.apk app/build/outputs/apk/debug/StellarDrift-v2.0-debug.apk
          mv app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/StellarDrift-v2.0-release.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: StellarDrift-v2.0-debug
          path: app/build/outputs/apk/debug/StellarDrift-v2.0-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: StellarDrift-v2.0-release
          path: app/build/outputs/apk/release/StellarDrift-v2.0-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Stellar Drift ${{ github.ref_name }}"
          body: |
            ## 🚀 Stellar Drift ${{ github.ref_name }}
            
            **An endless space survival game — made entirely by AI.**
            
            ### ✨ What's New in v2.0
            - 🕹️ Virtual joystick control
            - 🚀 Free movement in all directions
            - ⚡ Game speed setting (Slow / Normal / Fast)
            - 🌊 Tempo system (Calm → Pressure → Reward)
            - 💥 Freeze frame + shockwave on death
            - 🎯 Near-miss risk window bonus
            - 🔥 Overdrive mode at combo x8
            - 📊 Score milestones with celebrations
            - 🌟 Speed lines + vignette effects
            - 🛡️ Spawn warnings for fair gameplay
            
            ### 📦 Download
            - **Release APK** — Signed, ready to install
            - **Debug APK** — For testing
            
            ### 📱 Requirements
            - Android 5.0+ (API 21)
            - No permissions needed (except optional vibration)
          files: |
            app/build/outputs/apk/release/StellarDrift-v2.0-release.apk
            app/build/outputs/apk/debug/StellarDrift-v2.0-debug.apk
          draft: false
          prerelease: false
