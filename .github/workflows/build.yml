name: Build & Release Stellar Drift

on:
  push:
    branches: [ main, implementations ]
  tags: [ 'v*' ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > stellar-drift.jks
          keytool -list -keystore stellar-drift.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" || echo "Keystore check failed"

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Signed Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/debug/*.apk app/build/outputs/apk/debug/StellarDrift-debug.apk || true
          mv app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/StellarDrift-release.apk || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: StellarDrift-debug
          path: app/build/outputs/apk/debug/StellarDrift-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: StellarDrift-release
          path: app/build/outputs/apk/release/StellarDrift-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Stellar Drift ${{ github.ref_name }} — The Masterpiece Edition"
          body: |
            ## 🚀 Stellar Drift v5.0.0

            **An endless space survival & shooter game — made entirely by AI, using 100% Pure Java & Canvas API.**
            
            This is the **Ultimate Masterpiece Edition**, the culmination of dozens of updates, bringing meta-progression, programmatic audio, and unparalleled "Game Feel".

            ### ✨ Major New Features
            - 🛸 **The Mega Fleet:** 6 fully distinct, vector-drawn ships (Striker, Juggernaut, Phantom, Swarm, Eclipse, Zenith).
            - 🛒 **In-Game Economy & Upgrades:** Destroy asteroids to earn Cosmic Credits. Use credits in the fully responsive Canvas-drawn Shop to upgrade your ship's Speed, Fire Rate, and Damage!
            - ⛽ **Fuel & Survival System:** Stardust is now your Fuel. Keep collecting them or your ship will slow down to a crawl. Features a frantic heartbeat vibration when fuel is critical.
            - 🔫 **Shooter Mechanics:** Dynamic Auto-Fire system. Ships now shoot custom-shaped projectiles with muzzle flashes and trails.
            - 🔵 **Plasma Core (Nitro):** A rare blue drop that triggers a 4-second **OVERCHARGE**! Doubles your speed, triples your fire rate, and turns your ship into a bullet-hell machine.

            ### 🎬 Extreme "Juice" & Game Feel
            - **100% Programmatic Audio:** No MP3s. Every laser ("Piyuw"), explosion ("BOOM"), and UI click is generated in real-time using mathematical waveforms (Sine, Square, White Noise).
            - **Dynamic Ambient Drone:** The background music adapts to the game's Tempo (Calm, Pressure, Reward) with LFO modulation.
            - **Haptic Feedback:** Custom vibration patterns for every single action in the game.
            - **Fluid Physics:** The joystick now uses velocity-based physics with acceleration and friction for buttery smooth movement.
            - **Micro-Animations:** Elastic scaling score pop-ups, Screen Shake, Chromatic Aberration (Glitch) on death, and ship idle hover animations.
            
            ### 🛠️ Flawless Engineering
            - Zero Allocation (No GC Spikes) during gameplay via Object Pooling and Ring Buffers.
            - Flawless UI scaling across all device sizes.
            - Perfectly isolated Canvas Paint states.

            ### 📦 Install
            Download **StellarDrift-release.apk** below and experience the Masterpiece!
          files: |
            app/build/outputs/apk/release/StellarDrift-release.apk
            app/build/outputs/apk/debug/StellarDrift-debug.apk
          draft: false
          prerelease: false
