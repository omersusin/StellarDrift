name: Build & Release Stellar Drift

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > stellar-drift.jks
          keytool -list -keystore stellar-drift.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" || echo "Keystore check failed"

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Signed Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/debug/*.apk app/build/outputs/apk/debug/StellarDrift-debug.apk || true
          mv app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/StellarDrift-release.apk || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: StellarDrift-debug
          path: app/build/outputs/apk/debug/StellarDrift-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: StellarDrift-release
          path: app/build/outputs/apk/release/StellarDrift-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Stellar Drift ${{ github.ref_name }} — The Shooter Update"
          body: |
            ## 🚀 Stellar Drift ${{ github.ref_name }}

            **An endless space survival game — made entirely by AI.**
            
            This is the massive **"Shooter Update"**, transforming the game from a simple dodger into a fully-fledged Space Shooter with a functioning economy and unlockable ships!

            ### 💥 What's New
            - 🔫 **Auto-Fire Mechanics:** Your ship now automatically fires dual/triple projectiles based on your ship type.
            - 🛸 **New Unlockable Ships:**
              - **The Striker** (Default) - Fast & agile interceptor.
              - **The Juggernaut** - Heavy, armored bomber with slow but devastating dual cannons.
              - **The Phantom** - Alien technology featuring a triple-burst energy bolt.
            - 🛒 **In-Game Shop:** Collect Cosmic Credits by destroying asteroids and use them in the beautifully drawn Canvas-UI Shop to unlock new ships!
            - 🪨 **Destructible Asteroids:** Asteroids now have HP bars! Shoot them down for credits and explosive particle effects.
            - ⚡ **Muzzle Flashes & Projectile Trails:** High-quality visual feedback added to every shot fired.

            ### 📱 Requirements
            - Android 5.0+ (API 21)

            ### 📦 Install
            Download **StellarDrift-release.apk** and start blasting asteroids!
          files: |
            app/build/outputs/apk/release/StellarDrift-release.apk
            app/build/outputs/apk/debug/StellarDrift-debug.apk
          draft: false
          prerelease: false
